<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Cidade do Futuro</title>
  <link rel="shortcut icon" href="Imagens/favicon.ico" type="image/x-icon"> <!-- Adiciona o ícone de aba de navegador-->
  <link rel="stylesheet" href="css/formularios.css">

<body>

  <header id="cabecalho"> <!-- Indica o cabeçalho do nosso documento-->
    <nav>
      <object width="100%" height="200px" data="menu.html"></object>
    </nav>    
    
  </header>
  
  <main> <!-- indica que é o conteúdo principal dessa página -->
    
    <h1>Cadastro de Dados</h1>
    
    <form method="POST">
    
      <fieldset>
      
        <label for="evento">Evento</label>
        <select name="assunto" id="contato-assunto" required >
          <option value=""> -- Selecione --</option>                        
          <option value="voe">Nascimento</option>
          <option value="jun">População</option>
          <option value="inf">Óbito</option>
        </select>
      
      </fieldset>
      
      <fieldset>
        <legend>Informações de Acesso</legend>
          <p>
            <label for="inscrever-usuario">Funcionário</label>
            <input type="text" name="usuario" id="inscrever-usuario" required />
          </p>
          
          <p>
            <label for="inscrever-senha">Registro</label>
            <input type="password" name="senha" id="inscrever-senha" required />
          </p>
      </fieldset>

       <fieldset>
        <legend>Informações de Nascimento</legend>
         <p>
  <label for="matricula">Número de Matrícula</label>
  <input type="text" 
         name="matricula" 
         id="matricula" 
         placeholder="000000000000" 
         pattern="\d{12}" 
         maxlength="12" 
         required />
</p>

        <p>
          <label for="inscrever-nome">Nome Completo</label>
          <input type="text" name="nome" id="inscrever-nome" required />
        </p>
         <p>
          <label for="inscrever-nascimento">Data de Nascimento</label>
          <input type="date" name="nascimento" id="inscrever-nascimento" />
        </p>
        <p>
  <label for="inscrever-hora">Hora</label>
  <input type="time" name="hora" id="inscrever-hora" />
</p>
        <fieldset>
          <legend>Sexo</legend>
          <label for="inscrever-sexo-masc">Masculino
            <input id="inscrever-sexo-masc" type="radio" name="sexo" value="M" />
          </label>
          <label for="inscrever-sexo-fem">Feminino
            <input id="inscrever-sexo-fem" type="radio" name="sexo" value="F" />
          </label>
        </fieldset>
          <p>
          <label for="inscrever-nome">Nome Completo da Mãe</label>
          <input type="text" name="nome" id="inscrever-nome" required />
        </p>
           <p>
          <label for="inscrever-nome">Nome Completo do Pai</label>
          <input type="text" name="nome" id="inscrever-nome" required />
        </p>
<p>
  <label for="logradouro">Logradouro</label>
  <input type="text" name="logradouro" id="logradouro" placeholder="Rua Exemplo" />
</p>

<p>
  <label for="numero">Número</label>
  <input type="text" name="numero" id="numero" placeholder="0000" />
</p>

<p>
  <label for="complemento">Complemento</label>
  <input type="text" name="complemento" id="complemento" placeholder="AP 0000" />
</p>

<p>
  <label for="cep">CEP</label>
  <input type="text" name="cep" id="cep" placeholder="00000-000" pattern="\d{5}-\d{3}" />
</p>

<p>
  <label for="bairro">Bairro</label>
  <input type="text" name="bairro" id="bairro" placeholder="Nome do Bairro" />
</p>
       

      </fieldset>

       <fieldset>
        <legend>Informações da População</legend>
        <p>
          <label for="inscrever-nome">Nome Completo</label>
          <input type="text" name="nome" id="inscrever-nome" required />
        </p>
         <p>
          <label for="inscrever-nascimento">Data de Nascimento</label>
          <input type="date" name="nascimento" id="inscrever-nascimento" />
        </p>
         <fieldset>
          <legend>Sexo</legend>
          <label for="inscrever-sexo-masc">Masculino
            <input id="inscrever-sexo-masc" type="radio" name="sexo" value="M" />
          </label>
          
          <label for="inscrever-sexo-fem">Feminino
            <input id="inscrever-sexo-fem" type="radio" name="sexo" value="F" />
          </label>
        </fieldset>
             <p>
          <label for="inscrever-nome">Naturalidade</label>
          <input type="text" name="nome" id="inscrever-nome" required />
        </p>
           <p>
          <label for="inscrever-nome">Nacionalidade</label>
          <input type="text" name="nome" id="inscrever-nome" required />
        </p>
          <p>
          <label for="inscrever-nome">Nome Completo da Mãe</label>
          <input type="text" name="nome" id="inscrever-nome" required />
        </p>
           <p>
          <label for="inscrever-nome">Nome Completo do Pai</label>
          <input type="text" name="nome" id="inscrever-nome" required />
        </p>
              <p>
          <label for="inscrever-nome">Estado Civil</label>
          <input type="text" name="nome" id="inscrever-nome" required />
        </p>
         <p>
  <label for="numero">Filhos</label>
  <input type="text" name="numero" id="numero" placeholder="0000" />
</p>
                <p>
  <label for="numero">RG</label>
  <input type="text" name="numero" id="numero" placeholder="0000000000" />
</p>
                <p>
  <label for="numero">CPF</label>
  <input type="text" name="numero" id="numero" placeholder="000000000000" />
</p>
<p>
  <label for="logradouro">Logradouro</label>
  <input type="text" name="logradouro" id="logradouro" placeholder="Rua Exemplo" />
</p>

<p>
  <label for="numero">Número</label>
  <input type="text" name="numero" id="numero" placeholder="0000" />
</p>

<p>
  <label for="complemento">Complemento</label>
  <input type="text" name="complemento" id="complemento" placeholder="AP 0000" />
</p>

<p>
  <label for="cep">CEP</label>
  <input type="text" name="cep" id="cep" placeholder="00000-000" pattern="\d{5}-\d{3}" />
</p>

<p>
  <label for="bairro">Bairro</label>
  <input type="text" name="bairro" id="bairro" placeholder="Nome do Bairro" />
</p>  
        <p>
          <label for="inscrever-email">E-mail</label>
          <input type="email" name="email" id="inscrever-email" required />
        </p>
        <p>
          <label for="inscrever-celular">Celular (99) 99999-9999</label>
          <input type="tel" name="celular" id="inscrever-celular" pattern="\([0-9]{2}\) [0-9]{4,6}-[0-9]{3,4}$"/> 
        </p>
      </fieldset>
      
      <fieldset>
        <legend>Informações de Óbito</legend>
        <p>
          <label for="inscrever-nome">Nome Completo</label>
          <input type="text" name="nome" id="inscrever-nome" required />
        </p>
        <p>
          <label for="inscrever-email">E-mail</label>
          <input type="email" name="email" id="inscrever-email" required />
        </p>
        <p>
          <label for="inscrever-celular">Celular (99) 99999-9999</label>
          <input type="tel" name="celular" id="inscrever-celular" pattern="\([0-9]{2}\) [0-9]{4,6}-[0-9]{3,4}$"/> 
        </p>
      
        <fieldset>
          <legend>Sexo</legend>
          <label for="inscrever-sexo-masc">Masculino
            <input id="inscrever-sexo-masc" type="radio" name="sexo" value="M" />
          </label>
          
          <label for="inscrever-sexo-fem">Feminino
            <input id="inscrever-sexo-fem" type="radio" name="sexo" value="F" />
          </label>
        </fieldset>
        
        <p>
          <label for="inscrever-nascimento">Data de Nascimento</label>
          <input type="date" name="nascimento" id="inscrever-nascimento" />
        </p>
        
        <p>
          <label for="inscrever-github">Perfil no Github</label>
          <input type="url" name="github" id="inscrever-github" />
        </p>
      </fieldset>
      
      <p>        
        <input type="submit" value="Enviar">
        <input type="reset" value="Limpar">
      </p>
      
    </form>
    
  </main> 

  <footer>     
    <object width="100%" height="200px" data="rodape.html"></object>
