<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Cidade do Futuro</title>
<link rel="stylesheet" href="css/conteudo.css">
<script src="js/disabling.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script> <!-- adicionei>
</head>
<body>
  <header id="cabecalho"> <!-- Indica o cabeçalho do nosso documento-->
    <nav>
      <object width="100%" height="200px" data="menu.html"></object>
    </nav>    
  </header>
  
<body>
  <h2>População Atual</h2>
  <canvas id="graficoPizza"></canvas>

  <script>
    // Dados iniciais zerados
    const dadosIniciais = {
      labels: ['Nascimentos', 'Óbitos', 'População Atual'],
      datasets: [{
        data: [0, 0, 0], // começa zerado
        backgroundColor: ['#4CAF50', '#F44336', '#2196F3']
      }]
    };

    const config = {
      type: 'pie',
      data: dadosIniciais,
      options: {
        responsive: true,
        plugins: {
          legend: {
            position: 'right'
          }
        }
      }
    };

    const graficoPizza = new Chart(
      document.getElementById('graficoPizza'),
      config
    );

    // Exemplo de função para atualizar com dados do banco
    function atualizarGrafico(populacao, nascimentos, obitos) {
      graficoPizza.data.datasets[0].data = [nascimentos, obitos, populacao];
      graficoPizza.update();
    }

    // Simulação: depois de 3 segundos, atualiza com dados fictícios
    setTimeout(() => {
      atualizarGrafico(1000, 200, 50);
    }, 3000);
  </script>
</body>
</html>
